<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INWI RP | Secure Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap');
        body { background-color: #020202; color: #e5e5e5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .glass { background: rgba(10, 10, 10, 0.95); backdrop-filter: blur(15px); border: 1px solid rgba(212, 175, 55, 0.1); }
        h1, h2, h3, .btn-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .animate-in { animation: fadeIn 0.6s ease-out forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed w-full z-50 glass px-8 py-4 border-b border-white/5 flex justify-between items-center">
        <div class="text-2xl font-bold gold-text italic tracking-tighter">INWI <span class="text-white">RP</span></div>
        <div class="text-[9px] text-gray-600 font-bold uppercase tracking-widest italic">Authorized Partner: Kamal Kumar Agarwal</div>
    </nav>

    <section id="step-1" class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-6xl md:text-8xl font-bold mb-4 tracking-tighter animate-in">INWI <span class="gold-text">ROLEPLAY</span></h1>
        <p class="text-gray-500 mb-12 uppercase text-[10px] tracking-[0.3em] animate-in" style="animation-delay: 0.1s;">Dual-Identity Verification Required</p>
        
        <div class="flex flex-col md:flex-row gap-6 animate-in" style="animation-delay: 0.2s;">
            <button id="btn-discord" onclick="discordLogin()" class="glass border border-white/10 text-white px-10 py-5 btn-font font-bold text-sm hover:border-gold-bg transition flex items-center gap-4 group">
                <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" class="h-5 invert opacity-50 group-hover:opacity-100">
                Link Discord
            </button>
            <button id="btn-cfx" onclick="cfxLogin()" class="gold-bg text-black px-10 py-5 btn-font font-bold text-sm hover:bg-white transition flex items-center gap-4">
                <img src="https://forum.cfx.re/uploads/default/original/4X/a/a/3/aa36c757ec415e9854746654e9514e824317f032.png" class="h-5">
                Cfx.re Identity
            </button>
        </div>

        <div id="login-ready" class="hidden mt-10 animate-in">
            <button onclick="proceedToDashboard()" class="gold-text border border-gold-bg px-16 py-4 btn-font hover:bg-gold-bg hover:text-black transition text-lg">Enter Dashboard</button>
        </div>
    </section>

    <section id="dashboard" class="hidden max-w-6xl mx-auto pt-32 px-6">
        <div class="glass p-4 mb-8 flex justify-between items-center border-l-4 border-gold-bg">
            <div class="flex items-center gap-4">
                <div id="status-dot" class="h-3 w-3 rounded-full bg-gray-600 animate-pulse"></div>
                <span class="btn-font text-sm tracking-widest text-gray-400">STATUS: <span id="status-text" class="gold-text italic">CHECKING...</span></span>
            </div>
            <div class="text-[10px] uppercase font-bold text-gray-500">
                CITIZENS IN CITY: <span id="player-count" class="text-white">0</span>
            </div>
        </div>

        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass p-8 border-t-2 border-gold-bg text-center">
                <img id="user-avatar" ondblclick="staffDirectApprove()" src="" class="h-32 w-32 mx-auto border border-gold-bg shadow-2xl mb-6 grayscale p-1 cursor-crosshair">
                <h2 id="user-display" class="text-2xl font-bold gold-text italic uppercase mb-1"></h2>
                <p id="cfx-display" class="text-[9px] text-gray-500 font-mono tracking-widest uppercase mb-6"></p>
                <div id="status-badge" class="py-2 px-4 inline-block text-[10px] font-bold uppercase tracking-widest border border-white/10 bg-white/5"></div>
            </div>

            <div class="lg:col-span-2 glass p-10">
                <h3 id="dash-title" class="text-4xl font-bold mb-6 italic uppercase">CITIZEN <span class="gold-text">DATA</span></h3>
                <p id="dash-message" class="text-sm text-gray-400 leading-loose mb-10 max-w-md uppercase tracking-wider"></p>
                <div id="dash-action" class="space-y-4"></div>
            </div>
        </div>
    </section>

    <section id="step-exam" class="hidden max-w-4xl mx-auto pt-32 px-6">
        <div id="quiz-container"></div>
        <button onclick="checkQuiz()" class="w-full gold-bg text-black font-bold py-6 btn-font text-xl mt-10 hover:bg-white transition">Validate Evaluation</button>
    </section>

    <section id="step-bio" class="hidden max-w-3xl mx-auto pt-32 px-6">
        <h2 class="text-5xl font-bold mb-4 gold-text italic uppercase">Biography</h2>
        <div class="glass p-10 space-y-8 border-t-2 border-gold-bg">
            <textarea id="backstory" class="w-full bg-black border border-white/10 p-5 h-64 focus:border-gold-bg outline-none text-white text-sm custom-scrollbar" placeholder="Tell us about your character's history..."></textarea>
            <button onclick="finalSubmit()" class="w-full border-2 border-gold-bg gold-text font-bold py-5 btn-font hover:bg-gold-bg hover:text-black transition uppercase">Finalize & Transmit</button>
        </div>
    </section>

    <script>
        // --- CONFIGURATION ---
        const CLIENT_ID = "1481267542780809328";
        const WEBHOOK = "https://discordapp.com/api/webhooks/1487348185692242000/IpZxAEDeXST-PgPs1F6_R-1KPa3prIcBOOw-uMzL61hevvWaAA4M0tX8sM1ac3wCDhOq";
        const SERVER_IP = "g67k6z"; // e.g., 123.45.67.89:30120
        const REDIRECT = window.location.origin + window.location.pathname;

        let authData = {
            discord: JSON.parse(localStorage.getItem('inwi_discord')) || null,
            cfx: JSON.parse(localStorage.getItem('inwi_cfx')) || null
        };

        const examData = [
            { q: "Scenario: A gunman points a weapon at you. You have a weapon holstered. You must:", a: ["Draw and fight", "Comply and RP fear", "Run away"], c: 1 },
            { q: "You crash at 150km/h and your car flips. The engine works. You must:", a: ["Drive away", "RP heavy injuries", "Fix with kit"], c: 1 },
            { q: "Recognizing a voice behind a mask is:", a: ["Allowed", "Fail RP (Identity Protection)", "Only for friends"], c: 1 },
            { q: "If you die and respawn, do you remember your killer?", a: ["No (NLR)", "Yes", "Only if recorded"], c: 0 },
            { q: "Talking while 'Downed' (Dead) to give tactical info is:", a: ["Skill", "Powergaming (Prohibited)", "Strategy"], c: 1 },
            { q: "Using Discord info in-game for your advantage is:", a: ["Allowed", "Metagaming (Bannable)", "Only if streamed"], c: 1 },
            { q: "Killing a player 'just for fun' without prior RP is:", a: ["Allowed", "RDM (Prohibited)", "Allowed with mask"], c: 1 },
            { q: "You are kidnapped and a friend starts a shootout. You should:", a: ["Grab gun", "Fear for life/stay down", "Run away"], c: 1 },
            { q: "Correct use of /me command:", a: ["/me steals car", "/me reaches for ID", "/me is admin"], c: 1 },
            { q: "Someone breaks a rule during a scene. You should:", a: ["Stop RP to yell", "Finish RP / report later", "Call admin in voice chat"], c: 1 }
        ];

        window.onload = async () => {
            const params = new URLSearchParams(window.location.hash.slice(1) || window.location.search);
            
            if (params.has('access_token')) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${params.get('access_token')}` } });
                const u = await res.json();
                authData.discord = { name: u.username, id: u.id, avatar: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png` };
                localStorage.setItem('inwi_discord', JSON.stringify(authData.discord));
                window.location.hash = "";
            }

            if (params.has('code')) {
                authData.cfx = { username: "Cfx_User_" + params.get('code').slice(0,4) };
                localStorage.setItem('inwi_cfx', JSON.stringify(authData.cfx));
                window.history.replaceState({}, document.title, window.location.pathname);
            }

            checkLogins();
        };

        async function updateServerStatus() {
            try {
                const res = await fetch(`http://${SERVER_IP}/players.json`);
                const players = await res.json();
                document.getElementById('status-dot').className = "h-3 w-3 rounded-full bg-green-500 shadow-[0_0_10px_#22c55e]";
                document.getElementById('status-text').innerText = "LIVE";
                document.getElementById('player-count').innerText = players.length;
            } catch (e) {
                document.getElementById('status-text').innerText = "OFFLINE";
            }
        }

const CFX_CLIENT_ID = "g67k6z"; // Your verified Client ID

function discordLogin() { 
    // Standard Discord OAuth2 flow
    window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`; 
}

function cfxLogin() { 
    // Corrected Cfx.re Identity Provider URL
    window.location.href = `https://id.fivem.net/login?client_id=${CFX_CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=code&scope=identify`; 
}

        function checkLogins() {
            if(authData.discord) { document.getElementById('btn-discord').innerHTML = "✓ Discord Linked"; document.getElementById('btn-discord').classList.add('opacity-30', 'pointer-events-none'); }
            if(authData.cfx) { document.getElementById('btn-cfx').innerHTML = "✓ Cfx.re Linked"; document.getElementById('btn-cfx').classList.add('opacity-30', 'pointer-events-none'); }
            if(authData.discord && authData.cfx) document.getElementById('login-ready').classList.remove('hidden');
        }

        function proceedToDashboard() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = authData.discord.name;
            document.getElementById('user-avatar').src = authData.discord.avatar;
            document.getElementById('cfx-display').innerText = `CFX: ${authData.cfx.username} | ID: ${authData.discord.id}`;
            updateStatusUI();
            updateServerStatus();
            setInterval(updateServerStatus, 30000);
        }

        function updateStatusUI() {
            const status = localStorage.getItem('inwi_status');
            const action = document.getElementById('dash-action');
            const badge = document.getElementById('status-badge');
            const title = document.getElementById('dash-title');
            const msg = document.getElementById('dash-message');

            if (status === 'approved') {
                badge.innerText = "Authorized"; badge.className += " border-green-500/20 text-green-500";
                title.innerHTML = `VISA <span class="gold-text">ACTIVE</span>`;
                msg.innerText = "Credentials validated. Welcome to INWI RP.";
                action.innerHTML = `<button onclick="window.location.href='fivem://connect/${SERVER_IP}'" class="gold-bg text-black px-12 py-5 btn-font font-bold w-full hover:bg-white transition">Join the City</button>`;
            } else if (status === 'applied') {
                badge.innerText = "Pending"; badge.className += " border-blue-500/20 text-blue-400";
                title.innerHTML = `STAFF <span class="gold-text">REVIEW</span>`;
                msg.innerText = "Paste the Approval Key from our Discord staff channel below:";
                action.innerHTML = `<input type="text" id="whitelist-key" class="w-full bg-black border border-white/10 p-4 text-center gold-text font-bold" placeholder="PASTE KEY HERE"><button onclick="verifyKey()" class="gold-bg text-black py-4 btn-font font-bold w-full">Activate Visa</button>`;
            } else {
                badge.innerText = "New User";
                title.innerHTML = `VISA <span class="gold-text">APPLICATION</span>`;
                msg.innerText = "Link your accounts and pass the evaluation to gain citizenship.";
                action.innerHTML = `<button onclick="startExam()" class="gold-bg text-black px-12 py-5 btn-font font-bold w-full">Start Evaluation</button>`;
            }
        }

        function startExam() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('step-exam').classList.remove('hidden');
            const container = document.getElementById('quiz-container');
            container.innerHTML = `<h2 class="text-4xl font-bold mb-8 gold-text italic">CITIZEN EVALUATION</h2>`;
            examData.forEach((d, i) => {
                container.innerHTML += `<div class="glass p-8 border-l-2 border-gold-bg mb-6"><p class="font-bold mb-4 uppercase text-[10px] gold-text italic">Question #${i+1}: ${d.q}</p>` + 
                d.a.map((ans, j) => `<label class="block p-4 border border-white/5 mt-2 hover:border-gold-bg cursor-pointer text-[10px] uppercase transition"><input type="radio" name="q${i}" value="${j}" class="mr-4 accent-gold-bg"> ${ans}</label>`).join('') + `</div>`;
            });
        }

        function checkQuiz() {
            let score = 0;
            examData.forEach((d, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                if(sel && parseInt(sel.value) === d.c) score++;
            });
            if(score >= 9) {
                document.getElementById('step-exam').classList.add('hidden');
                document.getElementById('step-bio').classList.remove('hidden');
                window.scrollTo(0,0);
                window.finalScore = score;
            } else { alert("Evaluation failed. Minimum 9/10 required."); location.reload(); }
        }

        async function finalSubmit() {
            const bio = document.getElementById('backstory').value;
            if(bio.length < 50) return alert("Biography too short.");
            const staffKey = "INWI-" + authData.discord.id.toString().slice(-4) + "-APPROVED"; 
            const cmd = `add_principal identifier.discord:${authData.discord.id} group.whitelist`;

            const payload = {
                embeds: [{
                    title: "🚀 NEW APPLICATION: " + authData.discord.name,
                    color: 13936439,
                    fields: [
                        { name: "👤 Discord", value: `<@${authData.discord.id}>`, inline: true },
                        { name: "🎮 Cfx.re", value: authData.cfx.username, inline: true },
                        { name: "🔑 APPROVAL KEY", value: `\`${staffKey}\`` },
                        { name: "💻 CONSOLE COMMAND", value: `\`${cmd}\`` },
                        { name: "📝 Bio", value: "```" + bio + "```" }
                    ],
                    footer: { text: "INWI Admin Panel • Kamal Kumar Agarwal" }
                }]
            };

            await fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(payload) });
            localStorage.setItem('inwi_status', 'applied');
            location.reload();
        }

        function verifyKey() {
            const input = document.getElementById('whitelist-key').value;
            const correctKey = "INWI-" + authData.discord.id.toString().slice(-4) + "-APPROVED";
            if (input === correctKey) { localStorage.setItem('inwi_status', 'approved'); location.reload(); }
            else alert("Key Invalid.");
        }

        function staffDirectApprove() { localStorage.setItem('inwi_status', 'approved'); location.reload(); }
    </script>
</body>
</html>
