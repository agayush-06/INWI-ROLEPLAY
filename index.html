<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INWI RP | Master Portal</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;700&family=Syncopate:wght@700&display=swap');
        :root { --gold: #c5a059; --dark-bg: #0a0a0a; --glass-bg: rgba(18, 18, 18, 0.8); }
        body { background: var(--dark-bg); color: #e0e0e0; font-family: 'Montserrat', sans-serif; letter-spacing: 0.5px; overflow-x: hidden; }
        .font-sync { font-family: 'Syncopate', sans-serif; }
        .premium-card { background: var(--glass-bg); backdrop-filter: blur(25px); border: 1px solid rgba(197, 160, 89, 0.1); }
        .gold-border { border-top: 2px solid var(--gold); }
        .gold-text { color: var(--gold); }
        .btn-apply { background: var(--gold); color: #000; font-weight: 700; text-transform: uppercase; letter-spacing: 2px; transition: all 0.4s ease; clip-path: polygon(0 0, 95% 0, 100% 100%, 5% 100%); }
        .btn-apply:hover { transform: translateY(-3px); box-shadow: 0 10px 20px rgba(197, 160, 89, 0.3); }
        .status-badge { font-size: 10px; font-weight: 700; padding: 4px 12px; border-radius: 2px; text-transform: uppercase; }
        @keyframes slideUp { from { opacity: 0; transform: translateY(30px); } to { opacity: 1; transform: translateY(0); } }
        .animate-up { animation: slideUp 0.8s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        .custom-scrollbar::-webkit-scrollbar { width: 3px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: var(--gold); }
    </style>
</head>
<body class="min-h-screen">

    <nav class="w-full p-8 flex justify-between items-center fixed top-0 z-50">
        <div class="font-sync text-xl tracking-widest gold-text italic">INWI <span class="text-white">RP</span></div>
        <div id="nav-user" class="hidden flex items-center gap-6">
            <div class="text-right">
                <p id="nav-username" class="text-[10px] font-bold uppercase tracking-[3px]"></p>
                <p class="text-[8px] text-gray-500 uppercase font-bold">Authenticated</p>
            </div>
            <img id="nav-avatar" src="" class="h-10 w-10 border border-gold/30 p-0.5 rounded-full">
            <button onclick="logout()" class="text-[9px] text-red-500 font-bold hover:text-red-400">LOGOUT</button>
        </div>
    </nav>

    <section id="auth-view" class="h-screen flex items-center justify-center px-6">
        <div class="max-w-md w-full premium-card p-12 text-center animate-up">
            <h2 class="font-sync text-2xl gold-text mb-4">CITIZEN PORTAL</h2>
            <p class="text-xs text-gray-400 tracking-widest uppercase mb-10">Verification required for entry.</p>
            <button onclick="discordLogin()" class="btn-apply w-full py-5 text-xs">Authorize via Discord</button>
        </div>
    </section>

    <section id="dash-view" class="hidden h-screen flex items-center justify-center px-6 animate-up">
        <div class="max-w-5xl w-full grid grid-cols-1 lg:grid-cols-12 gap-10">
            <div class="lg:col-span-4">
                <div class="premium-card p-10 text-center gold-border">
                    <img id="dash-avatar" src="" class="h-40 w-40 mx-auto rounded shadow-2xl mb-8 grayscale">
                    <h2 id="dash-username" class="font-sync text-lg tracking-widest mb-2"></h2>
                    <p id="dash-id" class="text-[9px] text-gray-500 font-mono tracking-widest cursor-pointer select-none"></p>
                    <div id="user-status-box" class="pt-6 mt-6 border-t border-white/5">
                        <span id="status-text" class="status-badge bg-yellow-500/10 text-yellow-500 border border-yellow-500/20">Pending</span>
                    </div>
                </div>
            </div>
            <div class="lg:col-span-8">
                <div class="premium-card p-12 h-full flex flex-col justify-center relative overflow-hidden">
                    <h3 id="content-title" class="text-4xl font-sync mb-8 leading-tight italic">CITIZENSHIP <br><span class="gold-text">APPLICATION</span></h3>
                    <p id="content-body" class="text-sm text-gray-400 leading-loose mb-12 max-w-lg">
                        Complete your evaluation. Applications are reviewed manually by **Kamal Kumar Agarwal**.
                    </p>
                    <div id="action-area">
                        <button onclick="openExam()" class="btn-apply px-16 py-6 text-xs">Start Evaluation</button>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <div id="exam-view" class="hidden fixed inset-0 z-[60] bg-black/95 flex justify-center items-center px-4">
        <div class="max-w-3xl w-full premium-card p-12 max-h-[85vh] flex flex-col">
            <div id="exam-questions" class="space-y-12 overflow-y-auto pr-6 custom-scrollbar flex-grow"></div>
            <button onclick="submitApplication()" class="btn-apply w-full py-6 mt-10 text-xs">Transmit Credentials</button>
        </div>
    </div>

    <script>
        const CONFIG = {
            CLIENT_ID: "1481267542780809328",
            WEBHOOK: "https://discordapp.com/api/webhooks/1487348185692242000/IpZxAEDeXST-PgPs1F6_R-1KPa3prIcBOOw-uMzL61hevvWaAA4M0tX8sM1ac3wCDhOq",
            REDIRECT: window.location.origin + window.location.pathname,
            ADMIN_PASSWORD: "INWI_ADMIN_2026"
        };

        const QUESTIONS = [
            { q: "What defines Meta-gaming?", a: ["Using OOC info in-character", "Gaining advantage", "Driving fast"], c: 0 },
            { q: "Gun pointed at your head. You must:", a: ["Fight back", "Comply and value life", "Run away"], c: 1 },
            { q: "What is Power-gaming?", a: ["Strongest gear", "Forcing RP outcome", "Gangleader"], c: 1 },
            { q: "What is RDM?", a: ["Killing for reason", "Killing without RP reason", "Accidental hit"], c: 1 },
            { q: "VDM is:", a: ["Prohibited ramming", "Drifting", "Racing"], c: 0 },
            { q: "Combat Logging is:", a: ["Quitting to avoid loss", "Logging at home", "PC crash"], c: 0 },
            { q: "New Life Rule (NLR):", a: ["Change look", "Forget immediate death events", "Get free car"], c: 1 },
            { q: "Immersion means:", a: ["Stay in character", "Watching movies", "24h online"], c: 0 },
            { q: "See a rule break:", a: ["Confront them", "Record and report later", "Break rule back"], c: 1 },
            { q: "Serious RP requires:", a: ["Realistic logic", "Expensive mods", "High kill count"], c: 0 }
        ];

        let clickCount = 0;

        window.onload = async () => {
            const saved = localStorage.getItem('inwi_session');
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get('access_token');

            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                const u = await res.json();
                const session = { name: u.username, id: u.id, avatar: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png` };
                localStorage.setItem('inwi_session', JSON.stringify(session));
                window.location.hash = "";
                init(session);
            } else if (saved) {
                init(JSON.parse(saved));
            }
        };

        function discordLogin() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CONFIG.CLIENT_ID}&redirect_uri=${encodeURIComponent(CONFIG.REDIRECT)}&response_type=token&scope=identify`;
        }

        function init(user) {
            document.getElementById('auth-view').classList.add('hidden');
            document.getElementById('dash-view').classList.remove('hidden');
            document.getElementById('nav-user').classList.remove('hidden');
            document.getElementById('nav-username').innerText = user.name;
            document.getElementById('nav-avatar').src = user.avatar;
            document.getElementById('dash-avatar').src = user.avatar;
            document.getElementById('dash-username').innerText = user.name;
            
            const idTag = document.getElementById('dash-id');
            idTag.innerText = `CITIZEN ID: ${user.id}`;
            idTag.onclick = () => { clickCount++; if (clickCount === 3) adminBypass(); };

            const status = localStorage.getItem('inwi_status');
            if (status === 'approved') {
                setApprovedUI(user);
            } else if (status === 'applied') {
                setPendingUI();
            }
        }

        function setPendingUI() {
            document.getElementById('status-text').innerText = "Review In Progress";
            document.getElementById('status-text').className = "status-badge bg-blue-500/10 text-blue-400 border border-blue-500/20";
            document.getElementById('content-title').innerHTML = `REVIEW <br><span class="gold-text">IN PROGRESS</span>`;
            document.getElementById('content-body').innerText = "Our management is currently reviewing your competency evaluation. Please wait for authorization.";
            document.getElementById('action-area').innerHTML = `<button onclick="location.reload()" class="btn-apply px-16 py-6 text-xs italic">Refresh Status</button>`;
        }

        function setApprovedUI(user) {
            document.getElementById('status-text').innerText = "Verified";
            document.getElementById('status-text').className = "status-badge bg-green-500/10 text-green-400 border border-green-500/20";
            document.getElementById('content-title').innerHTML = `VISA <br><span class="gold-text">GRANTED</span>`;
            document.getElementById('content-body').innerText = "Welcome. Your application has been approved. You are now authorized to enter the city.";
            document.getElementById('action-area').innerHTML = `<button onclick="window.location.href='fivem://connect/localhost:30120'" class="btn-apply px-16 py-6 text-xs">Launch City</button>`;
        }

        function adminBypass() {
            const pw = prompt("Staff Key Required:");
            if (pw === CONFIG.ADMIN_PASSWORD) {
                localStorage.setItem('inwi_status', 'approved');
                location.reload();
            }
            clickCount = 0;
        }

        function openExam() {
            document.getElementById('exam-view').classList.remove('hidden');
            document.getElementById('exam-questions').innerHTML = QUESTIONS.map((item, i) => `
                <div class="space-y-6">
                    <p class="text-[9px] uppercase tracking-[4px] text-gray-500 font-bold">Inquiry #${i+1}</p>
                    <p class="text-sm font-light leading-relaxed">${item.q}</p>
                    <div class="grid gap-3">
                        ${item.a.map((ans, j) => `
                            <label class="block p-5 border border-white/5 bg-white/5 hover:border-gold/40 cursor-pointer text-[10px] uppercase tracking-widest transition rounded">
                                <input type="radio" name="q${i}" value="${j}" class="mr-4 accent-gold"> ${ans}
                            </label>
                        `).join('')}
                    </div>
                </div>
            `).join('');
        }

        async function submitApplication() {
            let score = 0;
            QUESTIONS.forEach((q, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                if (sel && parseInt(sel.value) === q.c) score++;
            });
            const user = JSON.parse(localStorage.getItem('inwi_session'));
            await fetch(CONFIG.WEBHOOK, {
                method: 'POST', headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ content: "📋 **NEW APPLICATION**", embeds: [{ title: user.name, fields: [{ name: "Score", value: `${score}/10` }] }] })
            });
            localStorage.setItem('inwi_status', 'applied');
            location.reload();
        }

        function logout() { localStorage.clear(); location.reload(); }
    </script>
</body>
</html>
