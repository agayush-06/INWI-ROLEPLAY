<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INWI RP | Personal Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap');
        body { background-color: #050505; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .glass { background: rgba(10, 10, 10, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(212, 175, 55, 0.1); }
        h1, h2, h3, .btn-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; }
    </style>
</head>
<body class="min-h-screen">

    <nav class="fixed w-full z-50 glass px-8 py-4 flex justify-between items-center">
        <div class="text-2xl font-bold gold-text italic">INWI <span class="text-white">RP</span></div>
        <div id="user-pill" class="hidden flex items-center gap-3 bg-black/50 p-1 pr-4 rounded-full border border-white/10">
            <img id="nav-avatar" src="" class="h-8 w-8 rounded-full border border-gold-bg">
            <span id="nav-name" class="text-xs font-bold uppercase tracking-widest"></span>
            <button onclick="logout()" class="text-[10px] text-red-500 font-bold ml-2">LOGOUT</button>
        </div>
    </nav>

    <section id="login-screen" class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-6xl font-bold mb-4 tracking-tighter">CITIZEN <span class="gold-text">PORTAL</span></h1>
        <p class="text-gray-500 mb-10 tracking-[4px] uppercase text-[10px]">Secure Access • Kamal Kumar Agarwal</p>
        <button onclick="discordLogin()" class="gold-bg text-black px-12 py-4 btn-font font-bold text-lg hover:tracking-[5px] transition-all duration-500">
            Login with Discord
        </button>
    </section>

    <section id="dashboard-screen" class="hidden pt-32 px-6 max-w-6xl mx-auto">
        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
            
            <div class="glass p-8 flex flex-col items-center text-center">
                <img id="dash-avatar" src="" class="h-32 w-32 rounded-full border-2 border-gold-bg mb-4 shadow-[0_0_30px_rgba(212,175,55,0.2)]">
                <h2 id="dash-name" class="text-3xl font-bold gold-text italic mb-1"></h2>
                <p id="dash-id" class="text-[10px] text-gray-600 font-mono mb-6"></p>
                <div class="w-full h-[1px] bg-white/5 mb-6"></div>
                <p class="text-[10px] text-gray-500 uppercase tracking-widest font-bold">Citizenship Status</p>
                <p id="dash-status" class="text-lg font-bold text-yellow-500">PENDING EXAM</p>
            </div>

            <div class="md:col-span-2 space-y-6">
                <div class="glass p-6 border-l-4 border-gold-bg">
                    <h3 class="text-sm font-bold tracking-widest text-gray-400 mb-4">CITY LIVE STATUS</h3>
                    <div class="flex justify-between items-end">
                        <span class="text-4xl font-bold">ONLINE</span>
                        <span class="text-gold-text font-mono text-xl">127.0.0.1:30120</span>
                    </div>
                </div>

                <div class="grid grid-cols-2 gap-6">
                    <div class="glass p-6 text-center">
                        <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Total Hours</p>
                        <p class="text-3xl font-bold gold-text">0.0</p>
                    </div>
                    <div class="glass p-6 text-center">
                        <p class="text-[10px] text-gray-500 uppercase font-bold mb-2">Bank Balance</p>
                        <p class="text-3xl font-bold gold-text">$0</p>
                    </div>
                </div>

                <button onclick="startVisaProcess()" id="action-btn" class="w-full py-6 gold-bg text-black btn-font font-bold text-2xl hover:bg-white transition">
                    START VISA APPLICATION
                </button>
            </div>
        </div>
    </section>

    <script>
        const CLIENT_ID = "YOUR_CLIENT_ID"; 
        const REDIRECT = window.location.origin + window.location.pathname;

        // Check if user is already logged in
        window.onload = async () => {
            const savedUser = localStorage.getItem('inwi_user');
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get('access_token');

            if (token) {
                // New Login
                fetchUserData(token);
                window.location.hash = ""; 
            } else if (savedUser) {
                // Return User
                showDashboard(JSON.parse(savedUser));
            }
        };

        function discordLogin() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`;
        }

        async function fetchUserData(token) {
            const res = await fetch('https://discord.com/api/users/@me', { 
                headers: { authorization: `Bearer ${token}` } 
            });
            const user = await res.json();
            const userData = {
                name: user.username,
                id: user.id,
                avatar: `https://cdn.discordapp.com/avatars/${user.id}/${user.avatar}.png`
            };
            localStorage.setItem('inwi_user', JSON.stringify(userData));
            showDashboard(userData);
        }

        function showDashboard(user) {
            document.getElementById('login-screen').classList.add('hidden');
            document.getElementById('dashboard-screen').classList.remove('hidden');
            document.getElementById('user-pill').classList.remove('hidden');
            
            // Fill Data
            document.getElementById('nav-name').innerText = user.name;
            document.getElementById('nav-avatar').src = user.avatar;
            document.getElementById('dash-name').innerText = user.name;
            document.getElementById('dash-avatar').src = user.avatar;
            document.getElementById('dash-id').innerText = `UID: ${user.id}`;
        }

        function logout() {
            localStorage.removeItem('inwi_user');
            location.reload();
        }

        function startVisaProcess() {
            // This would link to your Exam/Bio section
            alert("Redirecting to INWI Examination...");
        }
    </script>
</body>
</html>
