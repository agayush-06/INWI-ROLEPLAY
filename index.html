<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INWI RP | Discord Verified</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap');
        body { background-color: #030303; color: #e5e5e5; font-family: 'Inter', sans-serif; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .glass { background: rgba(8, 8, 8, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); }
        h1, h2, h3, .btn-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed w-full z-50 glass px-8 py-4 border-b border-white/5 flex justify-between items-center">
        <div class="text-2xl font-bold gold-text italic tracking-tighter">INWI <span class="text-white">RP</span></div>
        <div id="nav-status" class="text-[10px] text-gray-600 font-bold uppercase tracking-widest">Discord-Only Whitelist</div>
    </nav>

    <section id="step-1" class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-6xl md:text-8xl font-bold mb-4 tracking-tighter">INWI <span class="gold-text">ROLEPLAY</span></h1>
        <button onclick="discordLogin()" class="gold-bg text-black px-12 py-5 btn-font font-bold text-lg hover:bg-white transition flex items-center gap-4 shadow-[0_0_50px_rgba(212,175,55,0.2)]">
            Validate Discord ID
        </button>
    </section>

    <section id="dashboard" class="hidden max-w-6xl mx-auto pt-32 px-6">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass p-8 border-t-2 border-gold-bg text-center">
                <img id="user-avatar" src="" class="h-32 w-32 mx-auto border border-gold-bg shadow-2xl mb-6 grayscale p-1">
                <h2 id="user-display" class="text-2xl font-bold gold-text italic uppercase mb-1"></h2>
                <p id="user-id-display" class="text-[9px] text-gray-500 font-mono tracking-widest mb-6"></p>
                <div id="status-badge" class="py-2 px-4 inline-block text-[10px] font-bold uppercase border border-white/10 bg-white/5"></div>
            </div>

            <div class="lg:col-span-2 glass p-10">
                <h3 id="dash-title" class="text-4xl font-bold mb-6 italic uppercase"></h3>
                <p id="dash-message" class="text-sm text-gray-400 leading-loose mb-10 uppercase tracking-wider"></p>
                
                <div id="dash-action" class="space-y-4"></div>
            </div>
        </div>
    </section>

    <section id="step-exam" class="hidden max-w-4xl mx-auto pt-32 px-6"><div id="quiz-container"></div><button onclick="checkQuiz()" class="w-full gold-bg text-black font-bold py-6 btn-font text-xl mt-10">Submit Evaluation</button></section>
    <section id="step-bio" class="hidden max-w-3xl mx-auto pt-32 px-6"><div class="glass p-10 space-y-8 border-t-2 border-gold-bg"><textarea id="backstory" class="w-full bg-black border border-white/10 p-5 h-64 outline-none text-white text-sm" placeholder="Character Biography..."></textarea><button onclick="finalSubmit()" class="w-full border-2 border-gold-bg gold-text font-bold py-5 btn-font hover:bg-gold-bg hover:text-black transition">Transmit to Discord</button></div></section>

    <script>
        const CLIENT_ID = "1481267542780809328";
        const WEBHOOK = "https://discordapp.com/api/webhooks/1487348185692242000/IpZxAEDeXST-PgPs1F6_R-1KPa3prIcBOOw-uMzL61hevvWaAA4M0tX8sM1ac3wCDhOq";
        const REDIRECT = window.location.origin + window.location.pathname;

        // --- THE WHITELIST KEY LOGIC ---
        // Generates a unique key based on User ID for Staff to verify
        function generateSecretKey(userId) {
            return "INWI-" + userId.toString().slice(-4) + "-APPROVED";
        }

        let player = { name: "", id: "", avatar: "", score: 0 };

        window.onload = async () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get('access_token');
            const saved = localStorage.getItem('inwi_session');

            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                const u = await res.json();
                player = { name: u.username, id: u.id, avatar: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png` };
                localStorage.setItem('inwi_session', JSON.stringify(player));
                window.location.hash = "";
                loadDashboard();
            } else if (saved) {
                player = JSON.parse(saved);
                loadDashboard();
            }
        };

        function discordLogin() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`;
        }

        function loadDashboard() {
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = player.name;
            document.getElementById('user-avatar').src = player.avatar;
            document.getElementById('user-id-display').innerText = `IDENT: ${player.id}`;
            updateStatusUI();
        }

        function updateStatusUI() {
            const status = localStorage.getItem('inwi_status');
            const badge = document.getElementById('status-badge');
            const action = document.getElementById('dash-action');
            const title = document.getElementById('dash-title');
            const msg = document.getElementById('dash-message');

            if (status === 'approved') {
                badge.innerText = "Visa Active";
                badge.className = "py-2 px-4 inline-block text-[10px] font-bold uppercase border border-green-500/20 bg-green-500/10 text-green-500";
                title.innerHTML = `ENTRY <span class="gold-text">GRANTED</span>`;
                msg.innerText = "Your Discord clearance has been validated. You are whitelisted.";
                action.innerHTML = `<button onclick="window.location.href='fivem://connect/YOUR_SERVER_IP'" class="gold-bg text-black px-12 py-5 btn-font font-bold w-full">Join the City</button>`;
            } else if (status === 'applied') {
                badge.innerText = "Awaiting Verification";
                badge.className = "py-2 px-4 inline-block text-[10px] font-bold uppercase border border-blue-500/20 bg-blue-500/10 text-blue-400";
                title.innerHTML = `DISCORD <span class="gold-text">APPROVAL REQUIRED</span>`;
                msg.innerText = "Your application is in our Discord staff channel. Once approved, you will receive a Secret Key. Enter it below:";
                action.innerHTML = `
                    <input type="text" id="whitelist-key" class="w-full bg-black border border-white/10 p-4 text-center gold-text font-bold" placeholder="PASTE KEY HERE">
                    <button onclick="verifyKey()" class="gold-bg text-black py-4 btn-font font-bold w-full">Activate Visa</button>
                `;
            } else {
                badge.innerText = "Unregistered";
                title.innerHTML = `VISA <span class="gold-text">APPLICATION</span>`;
                msg.innerText = "You must submit your character details and pass the technical exam for staff review.";
                action.innerHTML = `<button onclick="startExam()" class="gold-bg text-black px-12 py-5 btn-font font-bold w-full">Start Application</button>`;
            }
        }

        function verifyKey() {
            const input = document.getElementById('whitelist-key').value;
            const correctKey = generateSecretKey(player.id);
            
            if (input === correctKey) {
                localStorage.setItem('inwi_status', 'approved');
                alert("Visa Activated. Welcome to INWI RP.");
                location.reload();
            } else {
                alert("INVALID KEY: Please wait for Staff approval in Discord.");
            }
        }

    </script>
</body>
</html>
