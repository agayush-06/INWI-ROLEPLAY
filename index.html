<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INWI RP | Authority Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&family=JetBrains+Mono&display=swap');
        :root { --gold: #d4af37; --bg: #030303; }
        body { background-color: var(--bg); color: #e5e5e5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .gold-bg { background: var(--gold); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .cyber-border { border: 1px solid rgba(212, 175, 55, 0.15); position: relative; }
        .id-card { background: linear-gradient(165deg, #111 0%, #080808 100%); border: 1px solid rgba(212, 175, 55, 0.15); }
        h1, h2, h3, .btn-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 3px; }
        
        .animate-in { animation: fadeIn 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        
        .scanner::after { 
            content: ''; position: absolute; width: 100%; height: 2px; 
            background: var(--gold); box-shadow: 0 0 15px var(--gold); 
            animation: scan 3s linear infinite; opacity: 0.1; top: 0; left: 0;
        }
        @keyframes scan { 0% { top: 0; } 100% { top: 100%; } }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed w-full z-50 glass px-10 py-5 border-b border-white/5 flex justify-between items-center">
        <div class="flex flex-col">
            <div class="text-3xl font-bold gold-text italic tracking-tighter uppercase">INWI <span class="text-white">CITY</span></div>
            <div class="text-[8px] font-bold text-gray-500 uppercase tracking-[0.5em] mt-1 flex items-center">
                <span class="w-1.5 h-1.5 rounded-full bg-green-500 mr-2 shadow-[0_0_8px_#22c55e]"></span> STATUS: DIRECT_LINK_ACTIVE
            </div>
        </div>
        <div class="flex gap-8 items-center">
            <button onclick="switchTab('visa')" id="tab-visa" class="text-[9px] font-bold gold-text uppercase tracking-widest border-b-2 border-gold-bg pb-1 transition-all">Registry</button>
            <button onclick="switchTab('tebex')" id="tab-tebex" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest hover:text-white pb-1 transition-all">Store</button>
            <button onclick="accessStaffTerminal()" class="text-red-500 border border-red-500/20 px-4 py-1 hover:bg-red-500/10 transition text-[8px] font-bold uppercase tracking-widest">Overseer</button>
        </div>
    </nav>

    <section id="step-1" class="h-screen flex flex-col justify-center items-center relative overflow-hidden">
        <div class="text-center z-10 animate-in">
            <h1 class="text-8xl md:text-[10rem] font-bold mb-2 tracking-tighter italic opacity-80 uppercase">INWI</h1>
            <p class="text-gray-500 uppercase tracking-[1em] text-[10px] mb-16 italic">Registry Managed by Kamal Kumar Agarwal</p>
            <button id="btn-discord" onclick="discordLogin()" class="gold-bg text-black px-20 py-7 btn-font font-bold text-xl hover:scale-105 transition shadow-[0_0_40px_rgba(212,175,55,0.2)]">Verify Identity</button>
            <div id="login-ready" class="hidden">
                <button onclick="proceedToDashboard()" class="border-2 border-gold-bg gold-text px-20 py-7 btn-font hover:bg-gold-bg hover:text-black transition text-xl italic">Initiate Clearance</button>
            </div>
        </div>
    </section>

    <section id="dashboard" class="hidden max-w-7xl mx-auto pt-44 px-8 animate-in">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-4 space-y-8">
                <div class="id-card p-10 cyber-border scanner overflow-hidden">
                    <div class="flex flex-col items-center mb-10 text-center">
                        <img id="user-avatar" src="" class="h-32 w-32 border-2 border-gold-bg/40 p-1 bg-black mb-6 grayscale brightness-125">
                        <h2 id="user-display" class="text-3xl font-bold gold-text italic uppercase">---</h2>
                        <div id="id-status-text" class="text-[10px] mt-2 font-bold uppercase tracking-[0.3em] text-red-500">Restricted</div>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-8">
                <div id="dash-content-visa" class="min-h-[500px]"></div>

                <div id="dash-content-tebex" class="hidden animate-in">
                    <div class="glass p-12 cyber-border text-center">
                        <h3 class="gold-text text-4xl font-bold italic mb-4 uppercase">INWI OFFICIAL STORE</h3>
                        <p class="text-gray-500 text-[10px] tracking-[0.4em] uppercase mb-12 italic">Powered by Tebex Engine</p>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-4 text-left mb-10">
                            <div class="p-5 border border-white/5 bg-white/[0.01]">
                                <h4 class="text-white font-bold text-[10px] uppercase mb-1">Priority Queue</h4>
                                <p class="text-[9px] text-gray-500 italic">Bypass city limits instantly.</p>
                            </div>
                            <div class="p-5 border border-white/5 bg-white/[0.01]">
                                <h4 class="text-white font-bold text-[10px] uppercase mb-1">Unique Assets</h4>
                                <p class="text-[9px] text-gray-500 italic">Custom imports and housing.</p>
                            </div>
                        </div>
                        <a href="https://inwi.tebex.io/" target="_blank" class="inline-block gold-bg text-black px-12 py-4 btn-font font-bold text-lg hover:bg-white transition italic uppercase">Visit Storefront</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="exam-section" class="hidden max-w-4xl mx-auto pt-44 px-8">
        <div id="quiz-container" class="space-y-6"></div>
        <button onclick="evaluateExam()" class="w-full gold-bg text-black font-bold py-8 btn-font text-2xl mt-12 hover:bg-white transition italic uppercase tracking-tighter">Transmit Evaluation</button>
    </section>

    <section id="bio-section" class="hidden max-w-3xl mx-auto pt-44 px-8 pb-20">
        <div class="glass p-12 cyber-border">
            <h2 class="text-4xl font-bold gold-text mb-8 italic uppercase text-center">Biometric Entry</h2>
            <textarea id="backstory" class="w-full bg-black/50 border border-white/10 p-8 h-80 focus:border-gold-bg outline-none text-white italic" placeholder="Enter character history..."></textarea>
            <button onclick="finalSubmit()" class="w-full border-2 border-gold-bg gold-text font-bold py-6 btn-font hover:bg-gold-bg hover:text-black transition uppercase mt-10 italic">Request Whitelist</button>
        </div>
    </section>

    <script>
        // MASTER CONFIG
        const SERVER_IP = "26.32.72.204"; // Replace with your actual IP
        const PASS_THRESHOLD = 7;
        const STAFF_PASSCODE = "INWI2026";
        const CLIENT_ID = "1481267542780809328";
        const STAFF_WEBHOOK = "https://discord.com/api/webhooks/1487348185692242000/IpZxAEDeXST-PgPs1F6_R-1KPa3prIcBOOw-uMzL61hevvWaAA4M0tX8sM1ac3wCDhOq";
        const RESULT_WEBHOOK = "https://discordapp.com/api/webhooks/1487876312277450893/NRXkmL2__jCntdz5Q690aDNw_EBZAGMK_eFi189ePZXni6SmR7AvZ16f0mrDkaMu2jvu"; 
        const TICKET_CHANNEL_URL = "https://discordapp.com/channels/908254117120593960/1484788825640140830";
        const REDIRECT = window.location.origin + window.location.pathname;

        let player = { name: "Citizen", id: "0000", avatar: "" };
        const examQuestions = [
            { q: "What is Fear RP?", a: ["Running from police", "Valuing your life above all", "Fighting back"], c: 1 },
            { q: "What is Metagaming?", a: ["Using Discord info in-game", "Playing well", "Talking loud"], c: 0 },
            { q: "What is NLR?", a: ["New car", "Forgetting events after death", "Moving house"], c: 1 },
            { q: "What is RDM?", a: ["Killing with reason", "Killing without RP reason", "Dying in car"], c: 1 },
            { q: "What is VDM?", a: ["Racing", "Using vehicle as weapon", "Fixing car"], c: 1 },
            { q: "What is Powergaming?", a: ["Doing impossible things", "High FPS", "Gang leader"], c: 0 },
            { q: "Recognize masked people by voice?", a: ["Yes", "No (Forbidden)", "Only friends"], c: 1 },
            { q: "Gun pointed at you?", a: ["Shoot", "Comply (Fear RP)", "Run"], c: 1 },
            { q: "What is OOC?", a: ["In character", "Out of character (Player)", "Radio"], c: 1 },
            { q: "Robbing bank balances?", a: ["Yes", "No (Prohibited)", "Only staff"], c: 1 }
        ];

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('key')) {
                localStorage.setItem('inwi_staff_key', urlParams.get('key').toUpperCase());
                localStorage.setItem('inwi_app_status', 'pending');
            }
            const hash = new URLSearchParams(window.location.hash.slice(1));
            if (hash.get('access_token')) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${hash.get('access_token')}` } });
                const u = await res.json();
                localStorage.setItem('inwi_discord', JSON.stringify({ name: u.username, id: u.id, avatar: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png` }));
                window.location.hash = "";
            }
            if(localStorage.getItem('inwi_discord')) {
                document.getElementById('btn-discord').classList.add('hidden');
                document.getElementById('login-ready').classList.remove('hidden');
            }
        };

        function proceedToDashboard() {
            player = JSON.parse(localStorage.getItem('inwi_discord'));
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = player.name;
            document.getElementById('user-avatar').src = player.avatar;
            updateDashboardUI();
        }

        function switchTab(t) {
            ['visa', 'tebex'].forEach(tab => {
                const el = document.getElementById(`dash-content-${tab}`);
                const btn = document.getElementById(`tab-${tab}`);
                if(el) el.classList.toggle('hidden', tab !== t);
                if(btn) btn.className = (tab === t) ? 
                    "text-[9px] font-bold gold-text uppercase tracking-widest border-b-2 border-gold-bg pb-1 transition-all" : 
                    "text-[9px] font-bold text-gray-500 uppercase tracking-widest hover:text-white pb-1 transition-all";
            });
        }

        function updateDashboardUI() {
            const status = localStorage.getItem('inwi_app_status') || 'new';
            const content = document.getElementById('dash-content-visa');
            const idStatus = document.getElementById('id-status-text');
            idStatus.innerText = status === 'approved' ? "Clearance Verified" : status === 'pending' ? "Manual Review" : "Restricted";
            idStatus.className = status === 'approved' ? "text-green-500 italic" : status === 'pending' ? "text-blue-400 italic" : "text-red-500 italic";

            if (status === 'new') {
                content.innerHTML = `<button onclick="startExam()" class="gold-bg text-black w-full py-16 btn-font font-bold text-4xl italic shadow-2xl">Begin Evaluation</button>`;
            } else if (status === 'pending') {
                content.innerHTML = `<div class="p-12 glass cyber-border animate-in"><h4 class="gold-text font-bold mb-4 italic uppercase">Registry Sync</h4><input id="activation-input" placeholder="XXXX-XXXX" class="bg-black/50 border border-white/10 text-gold-text text-center p-6 w-full outline-none font-mono text-2xl uppercase mb-6"><button onclick="verifyKey()" class="w-full gold-bg text-black py-5 font-bold italic uppercase tracking-widest mb-10">Verify Identity</button><div class="pt-8 border-t border-white/5 text-center"><a href="${TICKET_CHANNEL_URL}" target="_blank" class="text-blue-400 text-[9px] font-bold uppercase hover:underline italic">📩 Support Ticket FOR KEY AND URL</a></div></div>`;
            } else if (status === 'approved') {
                content.innerHTML = `<button onclick="window.location.href='fivem://connect/${SERVER_IP}'" class="gold-bg text-black w-full py-20 btn-font font-bold text-5xl italic shadow-[0_0_80px_rgba(212,175,55,0.3)] uppercase">Clearance Active</button>`;
            }
        }

        async function evaluateExam() {
            let score = 0;
            examQuestions.forEach((q, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                if(sel && parseInt(sel.value) === q.c) score++;
            });
            const passed = score >= PASS_THRESHOLD;
            const embedData = {
                content: passed ? `✅ **EXAM PASSED: <@${player.id}>**` : `❌ **EXAM FAILED: <@${player.id}>**`,
                embeds: [{
                    title: passed ? "EVALUATION SUCCESS" : "EVALUATION FAILURE",
                    color: passed ? 3066993 : 15158332,
                    fields: [ { name: "👤 PLAYER", value: `<@${player.id}>`, inline: true }, { name: "📊 SCORE", value: `**${score}/10**`, inline: true } ],
                    footer: { text: "INWI ROLEPLAY REGISTRY" }
                }]
            };
            await sendToDiscord(RESULT_WEBHOOK, embedData);
            if(passed) { document.getElementById('exam-section').classList.add('hidden'); document.getElementById('bio-section').classList.remove('hidden'); }
            else { alert("FAILED."); location.reload(); }
        }

        async function finalSubmit() {
            const bio = document.getElementById('backstory').value;
            const key = "INWI-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            await sendToDiscord(STAFF_WEBHOOK, {
                content: `🎫 **NEW APP: <@${player.id}>**`,
                embeds: [{ title: "BIO LOG", color: 13936439, description: `\`\`\`${bio}\`\`\``, fields: [{ name: "🔑 KEY", value: `\`${key}\``, inline: true }, { name: "🔗 URL", value: `[Approve](${window.location.origin + window.location.pathname}?key=${key})`, inline: true }] }]
            });
            localStorage.setItem('inwi_staff_key', key);
            localStorage.setItem('inwi_app_status', 'pending');
            location.reload();
        }

        async function sendToDiscord(url, p) { try { await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(p) }); } catch(e) {} }
        function verifyKey() { if(document.getElementById('activation-input').value.trim().toUpperCase() === localStorage.getItem('inwi_staff_key')) { localStorage.setItem('inwi_app_status', 'approved'); updateDashboardUI(); } else { alert("SYNC ERROR"); } }
        function discordLogin() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`; }
        function startExam() { document.getElementById('dashboard').classList.add('hidden'); document.getElementById('exam-section').classList.remove('hidden'); loadQuiz(); }
        function loadQuiz() { const c = document.getElementById('quiz-container'); c.innerHTML = ""; examQuestions.forEach((q, i) => { c.innerHTML += `<div class="glass p-10 cyber-border animate-in"><p class="gold-text uppercase text-[11px] font-bold mb-6 italic tracking-widest">PROTOCOL ${i+1}: ${q.q}</p>${q.a.map((ans, j) => `<label class="block p-5 border border-white/5 mt-4 text-[10px] uppercase cursor-pointer hover:bg-white/5 transition italic"><input type="radio" name="q${i}" value="${j}" class="mr-4"> ${ans}</label>`).join('')}</div>`; }); }
        function accessStaffTerminal() { if(prompt("ACCESS CODE:") === STAFF_PASSCODE) { localStorage.setItem('inwi_app_status', 'approved'); location.reload(); } }
    </script>
</body>
</html>
