<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INWI RP | Authority Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap');
        :root { --gold: #d4af37; --bg: #030303; }
        body { background-color: var(--bg); color: #e5e5e5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .gold-bg { background: var(--gold); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .cyber-border { border: 1px solid rgba(212, 175, 55, 0.15); position: relative; }
        .id-card { background: linear-gradient(165deg, #111 0%, #080808 100%); border: 1px solid rgba(212, 175, 55, 0.15); }
        h1, h2, h3, .btn-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        
        .stream-card iframe { width: 100%; aspect-ratio: 16 / 9; border: 1px solid rgba(212, 175, 55, 0.2); }

        @media (max-width: 768px) {
            .text-huge { font-size: 4rem !important; }
            .mobile-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; }
        }
    </style>
</head>
<body class="pb-10">

    <nav class="fixed w-full z-50 glass px-4 md:px-10 py-4 border-b border-white/5 flex justify-between items-center">
        <div class="flex flex-col">
            <div class="text-xl md:text-3xl font-bold gold-text italic tracking-tighter uppercase">INWI <span class="text-white">CITY</span></div>
            <div class="text-[7px] md:text-[8px] font-bold text-gray-500 uppercase tracking-[0.3em] mt-0.5">STATUS: DEPLOYED_V72</div>
        </div>
        <div class="flex gap-4 md:gap-8 items-center">
            <button onclick="switchTab('visa')" id="tab-visa" class="text-[9px] font-bold gold-text uppercase tracking-widest border-b-2 border-gold-bg pb-1">Registry</button>
            <button onclick="switchTab('media')" id="tab-media" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest hover:text-white pb-1">Live Feed</button>
            <button onclick="switchTab('tebex')" id="tab-tebex" class="text-[9px] font-bold text-gray-500 uppercase tracking-widest hover:text-white pb-1">Store</button>
            <button onclick="accessStaffTerminal()" class="text-red-500 border border-red-500/20 px-2 md:px-4 py-1 text-[8px] font-bold uppercase">Overseer</button>
        </div>
    </nav>

    <section id="step-1" class="h-screen flex flex-col justify-center items-center px-6 text-center relative overflow-hidden">
        <div class="z-10 animate-in">
            <h1 class="text-huge text-6xl md:text-[10rem] font-bold mb-4 tracking-tighter italic opacity-80 uppercase">INWI</h1>
            <p class="text-gray-500 uppercase tracking-[0.5em] text-[8px] md:text-[10px] mb-12 italic">Managed by INWI ROLEPLAY</p>
            <button id="btn-discord" onclick="discordLogin()" class="gold-bg text-black w-full md:w-auto px-12 py-5 btn-font font-bold text-lg hover:scale-105 transition shadow-lg">Verify Identity</button>
            <div id="login-ready" class="hidden">
                <button onclick="proceedToDashboard()" class="border-2 border-gold-bg gold-text w-full md:w-auto px-12 py-5 btn-font hover:bg-gold-bg hover:text-black transition text-lg italic">Initiate Clearance</button>
            </div>
        </div>
    </section>

    <section id="dashboard" class="hidden max-w-7xl mx-auto pt-24 md:pt-44 px-4 md:px-8 animate-in">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-6 md:gap-12">
            <div class="lg:col-span-4 space-y-6">
                <div class="id-card p-6 md:p-10 cyber-border">
                    <div class="flex flex-row lg:flex-col items-center gap-6 lg:text-center">
                        <img id="user-avatar" src="" class="h-20 w-20 md:h-32 md:w-32 border-2 border-gold-bg/40 p-1 bg-black grayscale">
                        <div>
                            <h2 id="user-display" class="text-xl md:text-3xl font-bold gold-text italic uppercase">---</h2>
                            <div id="id-status-text" class="text-[9px] mt-1 font-bold uppercase tracking-[0.2em]">Restricted</div>
                        </div>
                    </div>
                </div>

                <div class="glass p-6 border-l-4 border-gold-bg">
                    <h4 class="text-white font-bold text-[10px] uppercase tracking-widest mb-4 italic">Communication Hub</h4>
                    <div class="mobile-grid space-y-3 md:space-y-3">
                        <a href="https://discord.gg/Fa6Mb5W9x5" target="_blank" class="flex items-center justify-center gap-2 bg-[#5865F2] text-white py-3 text-[9px] font-bold uppercase hover:opacity-90 transition rounded-sm">Join Discord</a>
                        <a href="https://discord.com/channels/908254117120593960/1484788825640140830" target="_blank" class="flex items-center justify-center gap-2 border border-[#5865F2] text-[#5865F2] py-3 text-[9px] font-bold uppercase hover:bg-[#5865F2] hover:text-white transition rounded-sm">Open Ticket</a>
                        <a href="https://www.radmin-vpn.com/" target="_blank" class="block text-center border border-white/10 py-3 text-[9px] gold-text hover:bg-gold-bg hover:text-black transition uppercase font-bold rounded-sm">Get Radmin VPN</a>
                    </div>
                </div>
            </div>

            <div class="lg:col-span-8 space-y-6">
                <div id="dash-content-visa" class="min-h-[300px] md:min-h-[500px]"></div>
                <div id="dash-content-media" class="hidden animate-in">
                    <div class="glass p-6 md:p-10 cyber-border">
                        <h3 class="gold-text text-xl md:text-2xl font-bold italic mb-6 uppercase">Live Citations</h3>
                        <div class="grid grid-cols-1 md:grid-cols-2 gap-6">
                            <div class="stream-card bg-black/40 p-2 border border-white/5"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe></div>
                            <div class="stream-card bg-black/40 p-2 border border-white/5"><iframe src="https://www.youtube.com/embed/dQw4w9WgXcQ" frameborder="0" allowfullscreen></iframe></div>
                        </div>
                    </div>
                </div>
                <div id="dash-content-tebex" class="hidden animate-in">
                    <div class="glass p-8 md:p-12 cyber-border text-center">
                        <h3 class="gold-text text-2xl md:text-4xl font-bold italic mb-4 uppercase">OFFICIAL STORE</h3>
                        <a href="https://inwi.tebex.io/" target="_blank" class="inline-block gold-bg text-black px-10 py-4 btn-font font-bold text-md hover:bg-white transition uppercase italic">Visit Storefront</a>
                    </div>
                </div>
            </div>
        </div>
    </section>

    <section id="exam-section" class="hidden max-w-4xl mx-auto pt-24 md:pt-44 px-4 md:px-8">
        <div id="quiz-container" class="grid grid-cols-1 gap-4"></div>
        <button onclick="evaluateExam()" class="w-full gold-bg text-black font-bold py-6 btn-font text-xl mt-8 hover:bg-white transition uppercase italic">Transmit Evaluation</button>
    </section>

    <section id="bio-section" class="hidden max-w-3xl mx-auto pt-24 md:pt-44 px-4 md:px-8 pb-20">
        <div class="glass p-6 md:p-12 cyber-border">
            <h2 class="text-2xl md:text-4xl font-bold gold-text mb-6 italic uppercase text-center">Biometric Entry</h2>
            
            <div class="mb-6">
                <label class="block text-gold-text text-[10px] font-bold uppercase tracking-widest mb-2 italic">Donation/Visa Transaction ID</label>
                <input id="trans-id" type="text" class="w-full bg-black/50 border border-white/10 p-4 focus:border-gold-bg outline-none text-white font-mono text-sm uppercase" placeholder="Tebex ID (e.g. tbx-12345678-abcd)">
            </div>

            <div class="mb-6">
                <label class="block text-gold-text text-[10px] font-bold uppercase tracking-widest mb-2 italic">Character Backstory</label>
                <textarea id="backstory" class="w-full bg-black/50 border border-white/10 p-4 md:p-8 h-60 md:h-80 focus:border-gold-bg outline-none text-white italic text-sm" placeholder="Tell us about your character's arrival in the city..."></textarea>
            </div>

            <button onclick="finalSubmit()" class="w-full border-2 border-gold-bg gold-text font-bold py-5 btn-font hover:bg-gold-bg hover:text-black transition uppercase mt-2 italic">Request Whitelist</button>
        </div>
    </section>

    <script>
        const SERVER_IP = "26.32.72.204"; 
        const PASS_THRESHOLD = 7;
        const STAFF_PASSCODE = "INWI2026";
        const CLIENT_ID = "1481267542780809328";
        const STAFF_WEBHOOK = "https://discord.com/api/webhooks/1487348185692242000/IpZxAEDeXST-PgPs1F6_R-1KPa3prIcBOOw-uMzL61hevvWaAA4M0tX8sM1ac3wCDhOq";
        const RESULT_WEBHOOK = "https://discordapp.com/api/webhooks/1487876312277450893/NRXkmL2__jCntdz5Q690aDNw_EBZAGMK_eFi189ePZXni6SmR7AvZ16f0mrDkaMu2jvu"; 
        const REDIRECT = window.location.origin + window.location.pathname;

        let player = { name: "Citizen", id: "0000", avatar: "" };
        const examQuestions = [
            { q: "What is Fear RP?", a: ["Running from police", "Valuing your life above all", "Fighting back"], c: 1 },
            { q: "What is Metagaming?", a: ["Using Discord info in-game", "Playing well", "Talking loud"], c: 0 },
            { q: "What is NLR?", a: ["New car", "Forgetting events after death", "Moving house"], c: 1 },
            { q: "What is RDM?", a: ["Killing with reason", "Killing without RP reason", "Dying in car"], c: 1 },
            { q: "What is VDM?", a: ["Racing", "Using vehicle as weapon", "Fixing car"], c: 1 },
            { q: "What is Powergaming?", a: ["Doing impossible things", "High FPS", "Gang leader"], c: 0 },
            { q: "Recognize masked people by voice?", a: ["Yes", "No (Forbidden)", "Only friends"], c: 1 },
            { q: "Gun pointed at you?", a: ["Shoot", "Comply (Fear RP)", "Run"], c: 1 },
            { q: "What is OOC?", a: ["In character", "Out of character (Player)", "Radio"], c: 1 },
            { q: "Robbing bank balances?", a: ["Yes", "No (Prohibited)", "Only staff"], c: 1 }
        ];

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('key')) {
                localStorage.setItem('inwi_staff_key', urlParams.get('key').toUpperCase());
            }
            const hash = new URLSearchParams(window.location.hash.slice(1));
            if (hash.get('access_token')) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${hash.get('access_token')}` } });
                const u = await res.json();
                localStorage.setItem('inwi_discord', JSON.stringify({ name: u.username, id: u.id, avatar: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png` }));
                window.location.hash = "";
            }
            if(localStorage.getItem('inwi_discord')) {
                document.getElementById('btn-discord').classList.add('hidden');
                document.getElementById('login-ready').classList.remove('hidden');
            }
        };

        function proceedToDashboard() {
            player = JSON.parse(localStorage.getItem('inwi_discord'));
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = player.name;
            document.getElementById('user-avatar').src = player.avatar;
            updateDashboardUI();
        }

        function switchTab(t) {
            ['visa', 'tebex', 'media'].forEach(tab => {
                const el = document.getElementById(`dash-content-${tab}`);
                const btn = document.getElementById(`tab-${tab}`);
                if(el) el.classList.toggle('hidden', tab !== t);
                if(btn) btn.className = (tab === t) ? 
                    "text-[9px] font-bold gold-text uppercase tracking-widest border-b-2 border-gold-bg pb-1" : 
                    "text-[9px] font-bold text-gray-500 uppercase tracking-widest hover:text-white pb-1";
            });
        }

        function updateDashboardUI() {
            const status = localStorage.getItem('inwi_app_status') || 'new';
            const content = document.getElementById('dash-content-visa');
            const idStatus = document.getElementById('id-status-text');

            if (status === 'approved') {
                idStatus.innerText = "Clearance Verified";
                idStatus.className = "text-[9px] mt-1 font-bold uppercase tracking-[0.2em] text-green-500 italic";
                content.innerHTML = `
                    <div class="space-y-6 animate-in">
                        <div class="glass p-6 md:p-10 border-l-4 border-red-500 text-center">
                            <h3 class="text-white font-bold text-xs md:text-base uppercase tracking-widest mb-2">⚠️ Connection Bridge</h3>
                            <p class="text-gray-500 text-[9px] md:text-[11px] uppercase italic">Ensure Radmin VPN is linked to <span class="text-gold-text">INWI_ROLEPLAY_FREE</span>.</p>
                        </div>
                        <button onclick="window.location.href='fivem://connect/${SERVER_IP}'" class="gold-bg text-black w-full py-12 md:py-20 btn-font font-bold text-3xl md:text-5xl italic shadow-2xl uppercase hover:bg-white transition">Enter INWI City</button>
                    </div>`;
            } else if (status === 'pending') {
                idStatus.innerText = "Manual Review";
                idStatus.className = "text-[9px] mt-1 font-bold uppercase tracking-[0.2em] text-blue-400 italic";
                content.innerHTML = `
                    <div class="p-6 md:p-12 glass cyber-border animate-in text-center">
                        <h4 class="gold-text font-bold mb-4 italic uppercase text-sm">Registry Sync Required</h4>
                        <input id="activation-input" placeholder="XXXX-XXXX" class="bg-black/50 border border-white/10 text-gold-text text-center p-4 md:p-6 w-full outline-none font-mono text-xl md:text-2xl uppercase mb-6 focus:border-gold-bg">
                        <button onclick="verifyKey()" class="w-full gold-bg text-black py-4 font-bold italic uppercase tracking-widest hover:bg-white transition">Verify Identity</button>
                    </div>`;
            } else {
                idStatus.innerText = "Restricted";
                idStatus.className = "text-[9px] mt-1 font-bold uppercase tracking-[0.2em] text-red-500";
                content.innerHTML = `<button onclick="startExam()" class="gold-bg text-black w-full py-12 md:py-16 btn-font font-bold text-2xl md:text-4xl italic shadow-2xl hover:bg-white transition">Begin Evaluation</button>`;
            }
        }

        function startExam() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('exam-section').classList.remove('hidden');
            const c = document.getElementById('quiz-container');
            c.innerHTML = "";
            examQuestions.forEach((q, i) => {
                c.innerHTML += `<div class="glass p-6 md:p-10 cyber-border animate-in"><p class="gold-text uppercase text-[10px] md:text-[11px] font-bold mb-4 italic tracking-widest">PROTOCOL ${i+1}: ${q.q}</p>${q.a.map((ans, j) => `<label class="block p-4 border border-white/5 mt-3 text-[9px] md:text-[10px] uppercase cursor-pointer hover:bg-white/5 transition italic"><input type="radio" name="q${i}" value="${j}" class="mr-3"> ${ans}</label>`).join('')}</div>`;
            });
        }

        async function evaluateExam() {
            let score = 0;
            examQuestions.forEach((q, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                if(sel && parseInt(sel.value) === q.c) score++;
            });
            const passed = score >= PASS_THRESHOLD;
            await sendToDiscord(RESULT_WEBHOOK, {
                content: passed ? `✅ **PASS: <@${player.id}>**` : `❌ **FAIL: <@${player.id}>**`,
                embeds: [{ title: "EXAM RESULT", color: passed ? 3066993 : 15158332, fields: [{ name: "User", value: player.name, inline: true }, { name: "Score", value: `${score}/10`, inline: true }] }]
            });
            if(passed) { document.getElementById('exam-section').classList.add('hidden'); document.getElementById('bio-section').classList.remove('hidden'); }
            else { alert("Score insufficient."); location.reload(); }
        }

        async function finalSubmit() {
            const tid = document.getElementById('trans-id').value.trim();
            const bio = document.getElementById('backstory').value;
            
            if(tid.length < 5) return alert("Please enter a valid Transaction ID.");
            if(bio.length < 50) return alert("Character history too short.");

            const key = "INWI-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            await sendToDiscord(STAFF_WEBHOOK, {
                content: `🎫 **NEW APPLICATION: <@${player.id}>**`,
                embeds: [{ 
                    title: "APPLICATION LOG", 
                    color: 13936439, 
                    fields: [
                        { name: "Transaction ID", value: `\`${tid}\``, inline: false },
                        { name: "Key", value: `\`${key}\``, inline: true }, 
                        { name: "Approve Link", value: `[Approve Here](${REDIRECT}?key=${key})`, inline: true }
                    ],
                    description: `**Backstory:**\n\`\`\`${bio}\`\`\``
                }]
            });

            localStorage.setItem('inwi_staff_key', key);
            localStorage.setItem('inwi_app_status', 'pending');
            alert("Application transmitted.");
            location.reload();
        }

        async function sendToDiscord(url, p) { try { await fetch(url, { method: 'POST', headers: {'Content-Type':'application/json'}, body: JSON.stringify(p) }); } catch(e) {} }
        function verifyKey() { if(document.getElementById('activation-input').value.trim().toUpperCase() === localStorage.getItem('inwi_staff_key')) { localStorage.setItem('inwi_app_status', 'approved'); updateDashboardUI(); } else { alert("SYNC ERROR"); } }
        function discordLogin() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`; }
        function accessStaffTerminal() { if(prompt("ACCESS CODE:") === STAFF_PASSCODE) { localStorage.setItem('inwi_app_status', 'approved'); location.reload(); } }
    </script>
</body>
</html>
