<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INWI RP | Citizen Dashboard</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap');
        body { background-color: #030303; color: #e5e5e5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-text { color: #d4af37; }
        .gold-bg { background-color: #d4af37; }
        .glass { background: rgba(8, 8, 8, 0.98); backdrop-filter: blur(20px); border: 1px solid rgba(212, 175, 55, 0.1); }
        h1, h2, h3, .btn-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        .custom-scrollbar::-webkit-scrollbar { width: 4px; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #d4af37; border-radius: 10px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.8s ease-out forwards; }
    </style>
</head>
<body class="pb-20">

    <nav class="fixed w-full z-50 glass px-8 py-4 border-b border-white/5 flex justify-between items-center">
        <div class="text-2xl font-bold gold-text italic tracking-tighter">INWI <span class="text-white">RP</span></div>
        <div class="text-[10px] text-gray-600 font-bold uppercase tracking-widest italic text-right">
            Authorized:AYUSH AGARAWALl<br>
            <span id="header-connection" class="text-red-900">ENCRYPTION ACTIVE</span>
        </div>
    </nav>

    <section id="step-1" class="h-screen flex flex-col justify-center items-center text-center px-4">
        <h1 class="text-6xl md:text-8xl font-bold mb-4 tracking-tighter animate-in">CITIZEN <span class="gold-text">IDENTITY</span></h1>
        <p class="text-gray-500 mb-10 tracking-[5px] uppercase text-xs animate-in" style="animation-delay: 0.2s;">Secure Verification Required</p>
        
        <button id="btn-discord" onclick="discordLogin()" class="gold-bg text-black px-12 py-5 btn-font font-bold text-lg hover:bg-white transition flex items-center gap-4 shadow-[0_0_50px_rgba(212,175,55,0.2)] animate-in" style="animation-delay: 0.4s;">
            <img src="https://cdn-icons-png.flaticon.com/512/2111/2111370.png" class="h-6 invert grayscale">
            Initialize via Discord
        </button>

        <div id="login-ready" class="hidden mt-10 animate-in">
            <button onclick="proceedToDashboard()" class="gold-text border border-gold-bg px-16 py-4 btn-font hover:bg-gold-bg hover:text-black transition text-lg uppercase tracking-widest">Enter Citizen Hub</button>
        </div>
    </section>

    <section id="dashboard" class="hidden max-w-6xl mx-auto pt-32 px-6 animate-in">
        <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
            <div class="glass p-8 border-t-2 border-gold-bg text-center">
                <div class="relative inline-block mb-6">
                    <img id="user-avatar" src="" class="h-32 w-32 border border-gold-bg shadow-2xl grayscale p-1">
                    <div class="absolute -bottom-2 -right-2 gold-bg h-6 w-6 flex items-center justify-center rounded-full text-black text-[10px] font-bold">✓</div>
                </div>
                <h2 id="user-display" class="text-2xl font-bold gold-text italic uppercase mb-1"></h2>
                <p id="player-ip" class="text-[10px] text-gray-600 font-mono mb-6 uppercase">Checking IP...</p>
                <div id="app-status-badge" class="py-2 px-4 w-full text-[10px] font-bold uppercase border border-gold-bg gold-text italic">
                    Status: Unverified
                </div>
            </div>

            <div class="lg:col-span-2 glass p-10 relative overflow-hidden">
                <h3 class="text-4xl font-bold mb-6 italic uppercase">Visa <span class="gold-text">Control</span></h3>
                <div id="dash-content" class="space-y-6">
                    </div>
            </div>
        </div>
    </section>

    <section id="exam-section" class="hidden max-w-4xl mx-auto pt-32 px-6">
        <div id="quiz-container" class="space-y-4"></div>
        <button onclick="checkQuiz()" class="w-full gold-bg text-black font-bold py-6 btn-font text-xl mt-10 uppercase tracking-widest shadow-2xl">Submit Examination</button>
    </section>

    <section id="bio-section" class="hidden max-w-3xl mx-auto pt-32 px-6">
        <h2 class="text-5xl font-bold mb-4 gold-text italic uppercase">Biography</h2>
        <div class="glass p-10 space-y-8 border-t-2 border-gold-bg">
            <textarea id="backstory" class="w-full bg-black border border-white/10 p-5 h-64 focus:border-gold-bg outline-none text-white text-sm custom-scrollbar" placeholder="Tell us about your character's arrival and intent..."></textarea>
            <button onclick="finalSubmit()" class="w-full border-2 border-gold-bg gold-text font-bold py-5 btn-font hover:bg-gold-bg hover:text-black transition uppercase text-lg tracking-[5px]">Transmit Data</button>
        </div>
    </section>

    <script>
        const CLIENT_ID = "1481267542780809328";
        const WEBHOOK = "https://discordapp.com/api/webhooks/1487348185692242000/IpZxAEDeXST-PgPs1F6_R-1KPa3prIcBOOw-uMzL61hevvWaAA4M0tX8sM1ac3wCDhOq";
        const REDIRECT = window.location.origin + window.location.pathname;

        let player = { name: "", id: "", avatar: "", ip: "Pending", score: 0 };

        function discordLogin() {
            window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`;
        }

        window.onload = async () => {
            const params = new URLSearchParams(window.location.hash.slice(1));
            const token = params.get('access_token');
            
            if (token) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${token}` } });
                const u = await res.json();
                localStorage.setItem('inwi_discord', JSON.stringify({ 
                    name: u.username, 
                    id: u.id, 
                    avatar: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png` 
                }));
                window.location.hash = "";
            }

            const hasD = localStorage.getItem('inwi_discord');
            if(hasD) {
                document.getElementById('btn-discord').classList.add('hidden');
                document.getElementById('login-ready').classList.remove('hidden');
                document.getElementById('header-connection').innerText = "LINKED";
                document.getElementById('header-connection').classList.replace('text-red-900', 'text-green-500');
            }

            fetch('https://api.ipify.org?format=json').then(r => r.json()).then(d => player.ip = d.ip);
        };

        function proceedToDashboard() {
            const dData = JSON.parse(localStorage.getItem('inwi_discord'));
            player.name = dData.name; player.id = dData.id; player.avatar = dData.avatar;
            document.getElementById('step-1').classList.add('hidden');
            document.getElementById('dashboard').classList.remove('hidden');
            document.getElementById('user-display').innerText = player.name;
            document.getElementById('user-avatar').src = player.avatar;
            document.getElementById('player-ip').innerText = player.ip;
            updateDashboardUI();
        }

        function updateDashboardUI() {
            const status = localStorage.getItem('inwi_app_status') || 'new';
            const content = document.getElementById('dash-content');
            const badge = document.getElementById('app-status-badge');

            if (status === 'new') {
                content.innerHTML = `
                    <div class="border-l-4 border-gold-bg p-6 bg-white/5">
                        <h4 class="gold-text font-bold uppercase text-sm mb-2 italic">Citizenship Exam Required</h4>
                        <p class="text-gray-400 text-xs mb-6 uppercase tracking-widest leading-loose">To gain entrance into INWI Roleplay, you must pass our technical evaluation. This tests your knowledge on Fear RP, NLR, and Metagaming.</p>
                        <button onclick="startExam()" class="gold-bg text-black px-10 py-4 btn-font font-bold w-full hover:bg-white transition">Start 9/10 Evaluation</button>
                    </div>
                `;
            } else if (status === 'pending') {
                badge.innerText = "Status: VISA PENDING";
                badge.classList.replace('gold-text', 'text-blue-500');
                badge.classList.replace('border-gold-bg', 'border-blue-500');
                content.innerHTML = `
                    <div class="border-l-4 border-blue-500 p-6 bg-white/5">
                        <h4 class="text-blue-500 font-bold uppercase text-sm mb-2 italic">Submission Transmitted</h4>
                        <p class="text-gray-400 text-xs mb-6 uppercase tracking-widest">Your biography and technical scores are currently being reviewed by Kamal Kumar Agarwal's staff. Keep your Discord DMs open.</p>
                        <div class="animate-pulse text-[10px] text-blue-300">WAITING FOR STAFF HANDSHAKE...</div>
                    </div>
                `;
            }
        }

        function startExam() {
            document.getElementById('dashboard').classList.add('hidden');
            document.getElementById('exam-section').classList.remove('hidden');
            loadQuiz();
        }

        const examData = [
            { q: "A masked player with a recognizable voice robs you. Can you say their name?", a: ["Yes, I know it's them", "No; Mask = Identity Protection", "Only if staff is watching"], c: 1 },
            { q: "You are a passenger and the driver Alt+F4s during a police chase. You should:", a: ["Run away instantly", "Wait for police/staff at the spot", "Drive the car yourself"], c: 1 },
            { q: "3 gunmen hold you up. Your friend arrives and starts shooting. You should:", a: ["Help your friend", "Comply & fear for life", "Run for cover"], c: 1 },
            { q: "You are shot in the leg, bandage it, and start sprinting. This is:", a: ["Proper healing", "Fail RP (Injuries must be RPed)", "Allowed in gang wars"], c: 1 },
            { q: "As a hostage, you overhear the kidnapper's secret location. Can you tell police?", a: ["Yes, I heard it", "No (Passive Meta)", "Only if I have a camera"], c: 1 },
            { q: "Ramming a player at 100km/h without saying a word is:", a: ["Strategic hit", "VDM & RDM (Bannable)", "Allowed for mafias"], c: 1 },
            { q: "You respawn after being executed. What is the New Life Rule?", a: ["Remember everything", "Forget the scene/Stay away for 30m", "Call police on the killer"], c: 1 },
            { q: "Someone is trolling during a serious scene. You should:", a: ["Argue OOC", "Continue RP & Report later", "Troll them back"], c: 1 },
            { q: "Forcing a player to go to an ATM to empty their bank account is:", a: ["Good robbery", "Greed RP (Forbidden)", "Only for corrupt cops"], c: 1 },
            { q: "Your character is a rich doctor but starts a random street fight. This is:", a: ["Allowed", "Poor Character Consistency", "Funny RP"], c: 1 }
        ];

        function loadQuiz() {
            const container = document.getElementById('quiz-container');
            container.innerHTML = `<h2 class="text-3xl font-bold mb-8 gold-text italic tracking-tighter">TECHNICAL EVALUATION</h2>`;
            examData.forEach((d, i) => {
                container.innerHTML += `<div class="glass p-6 border-l-2 border-white/10 mb-5"><p class="font-bold mb-4 uppercase text-[10px] gold-text tracking-widest">Scenario ${i+1}: ${d.q}</p>` + 
                d.a.map((ans, j) => `<label class="block p-3 border border-white/5 mt-2 hover:border-gold-bg cursor-pointer text-[10px] uppercase transition"><input type="radio" name="q${i}" value="${j}" class="mr-3 accent-gold-bg"> ${ans}</label>`).join('') + `</div>`;
            });
        }

        function checkQuiz() {
            player.score = 0;
            examData.forEach((d, i) => {
                const sel = document.querySelector(`input[name="q${i}"]:checked`);
                if(sel && parseInt(sel.value) === d.c) player.score++;
            });
            if(player.score >= 9) { 
                document.getElementById('exam-section').classList.add('hidden'); 
                document.getElementById('bio-section').classList.remove('hidden'); 
                window.scrollTo(0,0); 
            } else { 
                alert(`SCORE: ${player.score}/10. YOU MUST PASS 9/10.`); 
                location.reload(); 
            }
        }

        async function finalSubmit() {
            const bio = document.getElementById('backstory').value;
            if(bio.length < 50) return alert("Your backstory must be more detailed.");
            
            const data = {
                content: "🔔 **INWI RP: NEW VISA FILED**",
                embeds: [{
                    title: "🚀 CITIZEN: " + player.name.toUpperCase(),
                    color: 13936439,
                    fields: [
                        { name: "👤 Discord", value: `<@${player.id}>`, inline: true },
                        { name: "📊 Score", value: `**${player.score}/10**`, inline: true },
                        { name: "📝 Bio", value: "```" + bio + "```" },
                        { name: "🛠️ Cmd", value: `\`/addwhitelist ${player.id}\`` }
                    ],
                    footer: { text: "Authorized: AYUSH AGARWAL*INWI ROLEPLAY" }
                }]
            };
            await fetch(WEBHOOK, { method: 'POST', headers: { 'Content-Type': 'application/json' }, body: JSON.stringify(data) });
            localStorage.setItem('inwi_app_status', 'pending');
            alert("VISA REQUEST TRANSMITTED.");
            location.reload();
        }
    </script>
</body>
</html>
