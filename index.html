<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>INWI RP | Elite Authority Hub</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Oswald:wght@700&family=Inter:wght@400;700&display=swap');
        :root { --gold: #d4af37; --bg: #030303; }
        body { background-color: var(--bg); color: #e5e5e5; font-family: 'Inter', sans-serif; overflow-x: hidden; }
        .gold-text { color: var(--gold); text-shadow: 0 0 10px rgba(212, 175, 55, 0.3); }
        .gold-bg { background: var(--gold); }
        .glass { background: rgba(255, 255, 255, 0.02); backdrop-filter: blur(40px); border: 1px solid rgba(255, 255, 255, 0.05); }
        .cyber-border { border: 1px solid rgba(212, 175, 55, 0.15); position: relative; }
        .id-card { background: linear-gradient(165deg, #111 0%, #080808 100%); border: 1px solid rgba(212, 175, 55, 0.15); }
        h1, h2, h3, .btn-font { font-family: 'Oswald', sans-serif; text-transform: uppercase; letter-spacing: 2px; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(15px); } to { opacity: 1; transform: translateY(0); } }
        .animate-in { animation: fadeIn 0.5s ease-out forwards; }
        input, textarea { transition: all 0.3s ease; }
        input:focus, textarea:focus { border-color: var(--gold) !important; box-shadow: 0 0 15px rgba(212, 175, 55, 0.1); }
        .locked-field { background: rgba(255, 255, 255, 0.03) !important; color: #666 !important; cursor: not-allowed; border: 1px solid rgba(255,255,255,0.05) !important; }
    </style>
</head>
<body class="pb-10">

    <nav class="fixed w-full z-50 glass px-4 md:px-10 py-4 border-b border-white/5 flex justify-between items-center">
        <div class="flex flex-col">
            <div class="text-xl md:text-3xl font-bold gold-text italic tracking-tighter uppercase">INWI <span class="text-white">CITY</span></div>
            <div class="text-[7px] md:text-[8px] font-bold text-gray-500 uppercase tracking-[0.3em] mt-0.5">EST. 2026 | INTERIO WINTERIO</div>
        </div>
        <div class="flex gap-4">
            <button onclick="accessStaffTerminal()" class="text-red-500 border border-red-500/20 px-4 py-1 text-[8px] font-bold uppercase">Overseer Access</button>
        </div>
    </nav>

    <section id="step-1" class="h-screen flex flex-col justify-center items-center px-6 text-center">
        <div class="z-10 animate-in">
            <h1 class="text-6xl md:text-[10rem] font-bold mb-4 tracking-tighter italic opacity-80 uppercase">INWI</h1>
            <p class="text-gray-500 uppercase tracking-[0.5em] text-[8px] md:text-[10px] mb-12 italic font-bold">Identity Verification Protocol</p>
            <button id="btn-discord" onclick="discordLogin()" class="gold-bg text-black w-full md:w-auto px-12 py-5 btn-font font-bold text-lg hover:scale-105 transition shadow-lg">Verify via Discord</button>
            <div id="login-ready" class="hidden">
                <button onclick="proceedToDashboard()" class="border-2 border-gold-bg gold-text w-full md:w-auto px-12 py-5 btn-font hover:bg-gold-bg hover:text-black transition text-lg italic uppercase">Access Hub</button>
            </div>
        </div>
    </section>

    <section id="dashboard" class="hidden max-w-7xl mx-auto pt-44 px-8 animate-in">
        <div class="grid grid-cols-1 lg:grid-cols-12 gap-12">
            <div class="lg:col-span-4">
                <div class="id-card p-10 cyber-border">
                    <img id="user-avatar" src="" class="h-32 w-32 border-2 border-gold-bg/40 p-1 bg-black grayscale mx-auto mb-6">
                    <h2 id="user-display" class="text-3xl font-bold gold-text italic uppercase text-center">---</h2>
                    <div id="id-status-text" class="text-[9px] mt-1 font-bold uppercase text-red-500 italic text-center tracking-[0.2em]">Registry: Restricted</div>
                </div>
            </div>
            <div class="lg:col-span-8">
                <div id="dash-content-visa" class="min-h-[500px]"></div>
            </div>
        </div>
    </section>

    <section id="exam-section" class="hidden max-w-4xl mx-auto pt-44 px-8 pb-20">
        <h2 class="text-3xl font-bold gold-text italic uppercase mb-8 text-center tracking-widest">Elite Rule Proficiency (10/10 Required)</h2>
        <div id="quiz-container" class="space-y-6"></div>
        <button onclick="evaluateExam()" class="w-full gold-bg text-black font-bold py-6 btn-font text-xl mt-12 italic uppercase">Transmit Evaluation</button>
    </section>

    <section id="bio-section" class="hidden max-w-4xl mx-auto pt-44 px-8 pb-20">
        <div class="glass p-12 cyber-border">
            <h2 class="text-4xl font-bold gold-text italic uppercase text-center mb-10">Citizen Registry Log</h2>
            <div class="grid grid-cols-1 md:grid-cols-2 gap-8 mb-8">
                <div class="space-y-6">
                    <div class="space-y-2">
                        <label class="text-[9px] gold-text uppercase font-bold italic tracking-widest">Tebex Transaction ID</label>
                        <input id="form-tebex" placeholder="tbx-xxxxxxx-xxxxxx" class="w-full bg-black/60 border border-white/5 p-4 focus:border-gold-bg outline-none text-white italic text-xs">
                    </div>
                    <div class="space-y-2">
                        <label class="text-[9px] text-gray-500 uppercase font-bold italic tracking-widest">Verified Identity (Auto)</label>
                        <input id="form-discord-locked" readonly class="w-full locked-field p-4 outline-none italic text-xs">
                    </div>
                </div>
                <div class="space-y-2">
                    <label class="text-[9px] gold-text uppercase font-bold italic tracking-widest">Character Backstory</label>
                    <textarea id="form-backstory" class="w-full bg-black/60 border border-white/5 p-4 h-[142px] focus:border-gold-bg outline-none text-white italic text-xs leading-relaxed" placeholder="Min. 100 words..."></textarea>
                </div>
            </div>
            <button onclick="finalManualSubmit()" class="w-full gold-bg text-black font-bold py-6 btn-font hover:bg-white transition uppercase italic text-xl">Submit to Overseer</button>
        </div>
    </section>

    <script>
        // CONFIG - Replace with your Webhooks
        const CLIENT_ID = "1481267542780809328"; 
        const STAFF_WEBHOOK = "https://discord.com/api/webhooks/1487348185692242000/IpZxAEDeXST-PgPs1F6_R-1KPa3prIcBOOw-uMzL61hevvWaAA4M0tX8sM1ac3wCDhOq";
        const RESULT_WEBHOOK = "https://discordapp.com/api/webhooks/1487876312277450893/NRXkmL2__jCntdz5Q690aDNw_EBZAGMK_eFi189ePZXni6SmR7AvZ16f0mrDkaMu2jvu";
        const REDIRECT = window.location.origin + window.location.pathname;

        let player = { name: "Citizen", id: "0", avatar: "" };

        const examQuestions = [
            { q: "Kidnapped and asked for your bank password at gunpoint. Action?", a: ["Give it to save life (Fail)", "Refuse (Powergaming)", "Tell them you forgot"], c: 1 },
            { q: "A police officer makes a rule mistake during arrest. Action?", a: ["Argue OOC in-game", "Continue RP and report later", "Refuse to play"], c: 1 },
            { q: "Recognize a masked rival gang member by voice. Action?", a: ["Call them by name", "Treat as stranger (Voice recognition is Meta)", "Ignore them"], c: 1 },
            { q: "Robber gets distracted, you have a gun in your bag. Action?", a: ["Shoot him", "Keep hands up (Fear RP)", "Run away"], c: 1 },
            { q: "Car flips 5 times but lands on wheels. Action?", a: ["Drive to repair", "RP serious injuries/wait for EMS", "Flip it back and leave"], c: 1 },
            { q: "What is 'Combat Logging'?", a: ["Fighting while logging", "Quitting during RP/Conflict", "Logging wood"], c: 1 },
            { q: "Kill a player immediately after robbing them without reason?", a: ["Allowed", "Not Allowed (RDM)", "Only if they have no gun"], c: 1 },
            { q: "Pull gun and kill someone for hitting your car at a red light?", a: ["Yes", "No (Low Quality RP/RDM)", "Only if no police"], c: 1 },
            { q: "Producing a shotgun from your pocket without a bag or RP?", a: ["Allowed", "Forbidden (Asspulling)", "Only if I'm a gang leader"], c: 1 },
            { q: "Use Discord info to seek revenge after dying in a war?", a: ["Yes", "No (NLR & Meta)", "Only with a silencer"], c: 1 }
        ];

        window.onload = async () => {
            const urlParams = new URLSearchParams(window.location.search);
            if (urlParams.get('key')) { 
                localStorage.setItem('inwi_staff_key', urlParams.get('key').toUpperCase()); 
                localStorage.setItem('inwi_app_status', 'pending'); 
            }
            const hash = new URLSearchParams(window.location.hash.slice(1));
            if (hash.get('access_token')) {
                const res = await fetch('https://discord.com/api/users/@me', { headers: { authorization: `Bearer ${hash.get('access_token')}` } });
                const u = await res.json();
                localStorage.setItem('inwi_discord', JSON.stringify({ name: u.username, id: u.id, avatar: `https://cdn.discordapp.com/avatars/${u.id}/${u.avatar}.png` }));
                window.location.hash = "";
            }
            if(localStorage.getItem('inwi_discord')) {
                document.getElementById('btn-discord').classList.add('hidden');
                document.getElementById('login-ready').classList.remove('hidden');
            }
        };

        function discordLogin() { window.location.href = `https://discord.com/api/oauth2/authorize?client_id=${CLIENT_ID}&redirect_uri=${encodeURIComponent(REDIRECT)}&response_type=token&scope=identify`; }
        
        function proceedToDashboard() { 
            player = JSON.parse(localStorage.getItem('inwi_discord')); 
            document.getElementById('step-1').classList.add('hidden'); 
            document.getElementById('dashboard').classList.remove('hidden'); 
            document.getElementById('user-display').innerText = player.name; 
            document.getElementById('user-avatar').src = player.avatar; 
            document.getElementById('form-discord-locked').value = `${player.name} (${player.id})`;
            updateDashboardUI(); 
        }

        function updateDashboardUI() {
            const status = localStorage.getItem('inwi_app_status') || 'new';
            const content = document.getElementById('dash-content-visa');
            if (status === 'approved') {
                content.innerHTML = `<div class="glass p-10 border-2 border-gold-bg/40 text-center"><h3 class="gold-text text-2xl font-bold uppercase italic">Clearance Verified</h3><a href="https://inwi.tebex.io/" target="_blank" class="block gold-bg text-black py-5 btn-font font-bold uppercase italic mt-6">Visit Tebex Store</a></div>`;
            } else if (status === 'pending') {
                content.innerHTML = `<div class="p-12 glass cyber-border text-center"><input id="key-in" placeholder="ENTER APPROVAL KEY" class="bg-black/50 border border-white/10 text-gold-text text-center p-6 w-full text-2xl uppercase mb-6 outline-none font-mono"><button onclick="verifyKey()" class="w-full gold-bg text-black py-4 font-bold italic uppercase">Synchronize Identity</button></div>`;
            } else {
                content.innerHTML = `<button onclick="startExam()" class="gold-bg text-black w-full py-24 btn-font font-bold text-5xl italic shadow-2xl uppercase">Initiate Elite Evaluation</button>`;
            }
        }

        function startExam() { document.getElementById('dashboard').classList.add('hidden'); document.getElementById('exam-section').classList.remove('hidden'); loadQuiz(); }
        function loadQuiz() { const c = document.getElementById('quiz-container'); c.innerHTML = ""; examQuestions.forEach((q, i) => { c.innerHTML += `<div class="glass p-8 cyber-border animate-in"><p class="gold-text text-[10px] font-bold mb-4 italic uppercase tracking-widest">ELITE PROTOCOL ${i+1}: ${q.q}</p>${q.a.map((ans, j) => `<label class="block p-4 border border-white/5 mt-3 text-[10px] uppercase cursor-pointer hover:bg-gold-bg/10 italic"><input type="radio" name="q${i}" value="${j}" class="mr-3"> ${ans}</label>`).join('')}</div>`; }); }

        async function evaluateExam() { 
            let score = 0; examQuestions.forEach((q, i) => { const sel = document.querySelector(`input[name="q${i}"]:checked`); if(sel && parseInt(sel.value) === q.c) score++; });
            const passed = score >= 10; // Elite Rule: 100% Correct Required

            await fetch(RESULT_WEBHOOK, {
                method: 'POST',
                headers: {'Content-Type':'application/json'},
                body: JSON.stringify({
                    content: passed ? `🏆 **ELITE PASS: <@${player.id}>**` : `💀 **FAIL: <@${player.id}>**`,
                    embeds: [{ title: "CRITICAL EVALUATION LOG", color: passed ? 3066993 : 15158332, fields: [{name:"Score", value:`${score}/10`}] }]
                })
            });

            if(passed) { document.getElementById('exam-section').classList.add('hidden'); document.getElementById('bio-section').classList.remove('hidden'); } 
            else { alert("ERROR: Evaluation failed. Absolute proficiency (10/10) is required for INWI City."); location.reload(); }
        }

        async function finalManualSubmit() {
            const tebex = document.getElementById('form-tebex').value.trim();
            const bio = document.getElementById('form-backstory').value.trim();
            if(!tebex || !bio) { alert("Incomplete documentation."); return; }

            const key = "INWI-" + Math.random().toString(36).substring(2, 8).toUpperCase();
            await fetch(STAFF_WEBHOOK, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({
                    content: `🚨 **REGISTRY PING: <@${player.id}>**`,
                    embeds: [{
                        title: "INWI AUTHORITY HUB | OVERSEER REVIEW",
                        color: 13936439,
                        fields: [
                            { name: "👤 DISCORD", value: `<@${player.id}>\nID: \`${player.id}\``, inline: true },
                            { name: "💳 TEBEX ID", value: `\`${tebex}\``, inline: true },
                            { name: "🔑 ASSIGNED KEY", value: `\`${key}\``, inline: true },
                            { name: "📖 BACKSTORY", value: `\`\`\`${bio}\`\`\`` },
                            { name: "⚡ AUTHORIZE", value: `[✅ AUTHORIZE](${REDIRECT}?key=${key})` }
                        ]
                    }]
                })
            });
            localStorage.setItem('inwi_staff_key', key);
            localStorage.setItem('inwi_app_status', 'pending');
            alert("Credentials transmitted to the Overseers."); location.reload();
        }

        function verifyKey() { if(document.getElementById('key-in').value.trim().toUpperCase() === localStorage.getItem('inwi_staff_key')) { localStorage.setItem('inwi_app_status', 'approved'); updateDashboardUI(); } else { alert("SYNC ERROR: Invalid Key."); } }
        function accessStaffTerminal() { if(prompt("OVERSEER CODE:") === "INWI2026") { localStorage.setItem('inwi_app_status', 'approved'); location.reload(); } }
    </script>
</body>
</html>
